name: Daily MLBB Crawl

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4  # ✅ v4로 업그레이드

      - name: Set up Python
        uses: actions/setup-python@v5  # ✅ v5로 업그레이드
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run crawler
        run: python crawl.py  # ✅ ipynb 대신 py 파일 실행

      - name: Commit and push index.html
        run: |
          git config user.name "chtj1024"
          git config user.email "chlqnftkwh@naver.com"
          git add index.html
          git commit -m "Update stats $(date +'%Y-%m-%d')" || echo "Nothing to commit"
          git push
