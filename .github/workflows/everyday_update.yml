name: Daily MLBB Crawl

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 UTC 00:00 (한국시간 09:00) 실행
  workflow_dispatch:       # 수동 실행도 가능

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run crawler
        run: jupyter nbconvert --to notebook --execute mlbb_stats.ipynb

      - name: Commit and push index.html
        run: |
          git config user.name "chtj1024"
          git config user.email "chlqnftkwh@naver.com"
          git add index.html
          git commit -m "Update stats $(date +'%Y-%m-%d')"
          git push
